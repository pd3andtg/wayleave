[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.pgsql",
  "php82Extensions.pdo_pgsql",
  "php82Extensions.mbstring",
  "php82Extensions.xml",
  "php82Extensions.tokenizer",
  "php82Extensions.ctype",
  "php82Extensions.fileinfo",
  "php82Extensions.openssl",
  "php82Extensions.bcmath",
  "php82Extensions.curl",
  "php82Extensions.zip",
  "php82Packages.composer",
  "nodejs_20",
  "nodePackages.npm"
]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader", "npm ci", "npm run build"]

[start]
# All artisan caching runs at start time so Railway's env vars are already injected.
cmd = "php artisan config:clear && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
